<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Card</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="id-card">
        <svg class="card-bg" viewBox="0 0 380 590" preserveAspectRatio="none">
            <path d="M 0 195 Q 190 255 380 195 L 380 0 L 0 0 Z" fill="#8dc63f" />
            <path d="M 0 180 Q 190 240 380 180 L 380 0 L 0 0 Z" fill="#ffffff" />
            <path d="M 0 165 Q 190 225 380 165 L 380 0 L 0 0 Z" fill="#ea5b23" />
            <path d="M 0 150 Q 190 210 380 150 L 380 0 L 0 0 Z" fill="#ffffff" />
        </svg>

        <div class="card-content">
            <div class="logo">
                <svg class="logo-svg" viewBox="0 0 100 100">
                    <!-- Leaf shape representing the orange leaf -->
                    <path d="M 50 15 C 65 -5 85 10 70 30 C 55 25 50 20 50 15 Z" fill="#8dc63f" />
                    <!-- Orange C Arc: Outer R=36, Inner R=22 -->
                    <path d="M 52 14 A 36 36 0 1 0 86 45 L 70 45 A 20 20 0 1 1 48 29 Z" fill="#ea5b23" />
                    <!-- Blue Gear center circle -->
                    <circle cx="48" cy="54" r="15" fill="#355e93" />
                    <!-- Gear teeth (simple approximation) -->
                    <path
                        d="M 44 35 h 8 v -4 h -8 z M 44 77 h 8 v -4 h -8 z M 29 50 h -4 v 8 h 4 z M 71 50 h -4 v 8 h 4 z"
                        fill="#355e93" />
                    <!-- Worker inside gear -->
                    <path d="M 38 64 Q 48 50 58 64 Z" fill="#ffffff" />
                    <circle cx="48" cy="48" r="4.5" fill="#ea5b23" />
                    <circle cx="48" cy="48" r="2" fill="#355e93" />
                </svg>
                <div class="logo-text">
                    <div class="logotxt-orange">Orange</div>
                    <div class="logotxt-blue">Services</div>
                </div>
            </div>

            <div class="main-title">ORANGE SERVICES</div>
            <div class="sub-title">ISO 9001 : 2015</div>

            <div class="profile-pic"></div>

            <div class="name">Name</div>
            <div class="designation">Designation</div>

            <div class="emp-id-bar">
                <div class="emp-id-text">EMPLOYEE ID :</div>
            </div>

            <div class="details-grid">
                <div>Date of Joining</div>
                <div>:</div>
                <div></div>
                <div>Mobile</div>
                <div>:</div>
                <div></div>
                <div>Address</div>
                <div>:</div>
                <div></div>
                <div>Valid Upto</div>
                <div></div>
                <div></div>
            </div>

            <div class="signature">Aut. Signature</div>
        </div>
    </div>

</body>

</html>
