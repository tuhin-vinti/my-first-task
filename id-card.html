<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orange Services - Employee ID Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --white: #ffffff;
      --blue-main: #1e3a8a;
      --orange: #ff8c00;
      --green: #3cb371;
      --grey-photo: #cccccc;
      --black: #333333;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Open Sans', Arial, Helvetica, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #e8e8e8;
      padding: 2rem;
    }

    .id-card {
      width: 320px;
      background: var(--white);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
    }

    /* ========== Header (white) ========== */
    .header {
      padding: 20px 20px 14px;
      text-align: center;
      background: var(--white);
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .logo-icon {
      width: 52px;
      height: 52px;
      flex-shrink: 0;
    }

    .logo-text {
      text-align: left;
    }

    .logo-text .orange-word {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--orange);
      line-height: 1.1;
    }

    .logo-text .services-word {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--orange);
      font-style: italic;
      text-decoration: underline;
      text-underline-offset: 2px;
      letter-spacing: 0.02em;
    }

    .company-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--blue-main);
      letter-spacing: 0.14em;
      margin-bottom: 4px;
    }

    .iso {
      font-size: 0.7rem;
      font-weight: 400;
      color: var(--black);
      letter-spacing: 0.06em;
    }

    /* ========== Middle: curved bands + blue + photo ========== */
    .middle {
      position: relative;
      background: var(--blue-main);
      padding: 0 20px 16px;
    }

    /* Curved bands (orange, white, green) sweeping down into blue */
    .bands {
      position: relative;
      height: 90px;
      /* pull curves slightly upward to cover top blue edge */
      margin: -10px -20px 0;
    }

    .bands-svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Photo and name/designation sit on blue, overlapping bands */
    .profile-block {
      position: relative;
      z-index: 2;
      margin-top: -52px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .photo-placeholder {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: var(--grey-photo);
      border: 4px solid var(--white);
      margin-bottom: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    .profile-name,
    .profile-designation {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--white);
      text-align: center;
    }

    .profile-name {
      margin-bottom: 2px;
    }

    /* ========== Bottom details (blue) ========== */
    .details {
      background: var(--blue-main);
      padding: 0 20px 24px;
      color: var(--white);
    }

    .detail-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .detail-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .detail-input {
      width: 50%;
      max-width: 140px;
      height: 22px;
      background: var(--white);
      border: 1px solid var(--black);
      border-radius: 2px;
      padding: 0 6px;
      font-size: 0.7rem;
      color: var(--black);
      font-family: inherit;
    }

    .detail-line {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }

    .detail-line:last-of-type {
      margin-bottom: 0;
    }

    .footer-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-top: 14px;
    }

    .valid-upto {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .signature {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>
  <div class="id-card">
    <header class="header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Orange fruit -->
          <circle cx="26" cy="26" r="24" fill="url(#orangeGrad)"/>
          <!-- Green leaf -->
          <path d="M12 10 Q18 6 22 12 Q16 14 12 10Z" fill="#3cb371"/>
          <!-- Blue gear -->
          <circle cx="26" cy="26" r="14" fill="#1e3a8a"/>
          <!-- Two figures: heads -->
          <circle cx="22" cy="23" r="3.5" fill="white"/>
          <circle cx="30" cy="23" r="3.5" fill="white"/>
          <!-- Bodies -->
          <rect x="20.5" y="27" width="3" height="6" rx="1" fill="white"/>
          <rect x="28.5" y="27" width="3" height="6" rx="1" fill="white"/>
          <defs>
            <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#ffa500"/>
              <stop offset="100%" stop-color="#ff8c00"/>
            </linearGradient>
          </defs>
        </svg>
        <div class="logo-text">
          <div class="orange-word">Orange</div>
          <div class="services-word">Services</div>
        </div>
      </div>
      <div class="company-name">ORANGE SERVICES</div>
      <div class="iso">ISO 9001 : 2015</div>
    </header>

    <section class="middle">
      <div class="bands">
        <svg class="bands-svg" viewBox="0 0 320 90" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Orange top band (slightly thicker / deeper curve) -->
          <path d="M0,22 Q160,0 320,22 L320,40 Q160,18 0,40 Z" fill="var(--orange)" />
          <!-- White middle band -->
          <path d="M0,40 Q160,18 320,40 L320,58 Q160,36 0,58 Z" fill="var(--white)" />
          <!-- Green bottom band -->
          <path d="M0,58 Q160,36 320,58 L320,78 Q160,56 0,78 Z" fill="var(--green)" />
        </svg>
      </div>
      <div class="profile-block">
        <div class="photo-placeholder"></div>
        <div class="profile-name">Name</div>
        <div class="profile-designation">Designation</div>
      </div>
    </section>

    <section class="details">
      <div class="detail-row">
        <span class="detail-label">EMPLOYEE ID :</span>
        <input type="text" class="detail-input" readonly>
      </div>
      <div class="detail-line">Date of Joining :</div>
      <div class="detail-line">Mobile :</div>
      <div class="detail-line">Address :</div>
      <div class="footer-row">
        <span class="valid-upto">Valid Upto :</span>
        <span class="signature">Aut. Signature</span>
      </div>
    </section>
  </div>
</body>
</html>
